          "name": "What is EduSeek?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "EduSeek is a new kind of learning home in India, built to help every child discover real world skills communication, leadership, creativity, technology, problem-solving, and more — alongside the academics they study at school."
          }
        },

          "@type": "Question",
          "name": "Who is EduSeek for?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "EduSeek is designed for young learners and their parents. We work with children across primary and secondary school years, shaping each journey around the child's strengths, interests, and pace."
          }
        },
        {
          "@type": "Question",
          "name": "How is EduSeek different from a traditional school?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Traditional schools focus on syllabus and exams and they do that well. EduSeek adds what those systems often miss: skill discovery, mentorship, hands-on projects, and a personalized growth path that helps children build the abilities life rewards."
          }
        },
        {
          "@type": "Question",
          "name": "What kinds of skills will my child develop here?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Communication, leadership, creativity, technology, problem-solving, an entrepreneurship mindset, critical thinking, and collaboration. We treat these as core skills, practiced steadily over time — not as side activities."
          }
        },
        {
          "@type": "Question",
          "name": "Does EduSeek replace my child's regular school?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "No. EduSeek is meant to work alongside your child's school. We're the place where the skills schools rarely have time to teach are nurtured — without taking anything away from their academic life."
          }
        },
        {
          "@type": "Question",
          "name": "How will I know my child is making progress?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Parents stay close to the journey. We share regular updates from mentors, showcase project work, and host moments where your child can present what they've built. Growth is celebrated openly — not measured by a single number."
          }
        },
        {
          "@type": "Question",
          "name": "How are mentors at EduSeek selected?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Our mentors are chosen for warmth, patience, and real-world experience in the skill they guide. Every mentor commits to listening before teaching — the same value EduSeek was built on."
          }
        },
        {
          "@type": "Question",
          "name": "How do we get started?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Tell us a little about your child through the enquiry form below. A mentor from the EduSeek team will reach out personally to understand them better — their curiosities, their strengths, and what they love. From there, we walk the path together."
          }
        }
      ]
    }
    </script>
